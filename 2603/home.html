<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Aluno - Sinfonia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="dashboard-wrapper display-flex">
        <aside class="sidebar bg-dark" id="menu-lateral">
            <div class="perfil-card text-center">
                <img src="../img/avatar.png" alt="Foto de perfil do aluno" class="avatar-img rounded-circle">
                <p class="nome-aluno">Olá, <strong>Estudante</strong>!</p>
            </div>
            
            <nav class="sidebar-nav nav-vertical">
                <ul>
                    <li><a href="home.html" class="nav-link active">Painel Inicial</a></li>
                    <li><a href="table.html" class="nav-link">Minha Grade</a></li>
                    <li><a href="landing.html" class="nav-link logout-link">Sair</a></li>
                </ul>
            </nav>
        </aside>

        <main class="dashboard-content container-fluid">
            <header class="top-bar space-between pb-2 mt-2 border-bottom">
                <h2 class="titulo-sessao">Resumo dos seus Cursos</h2>
                <button class="btn btn-outline" id="btn-msg">Mensagens (0)</button>
            </header>

            <section class="cards-grid display-grid mt-3">
                <article class="curso-card stat-concluido">
                    <h3 class="curso-titulo">Teoria Musical I</h3>
                    <p class="curso-prof">Prof. Mozart</p>
                    <span class="badge badge-green text-uppercase">Concluído</span>
                </article>

                <article class="curso-card stat-andamento">
                    <h3 class="curso-titulo">Prática de Conjunto</h3>
                    <p class="curso-prof">Prof. Beethoven</p>
                    <span class="badge badge-yellow text-uppercase">Em Andamento (60%)</span>
                    <div class="progress-bar-bg mt-1">
                        <div class="progress-fill" style="width: 60%"></div>
                    </div>
                </article>

                <article class="curso-card stat-pendente">
                    <h3 class="curso-titulo">Harmonia Funcional</h3>
                    <p class="curso-prof">Prof. Bach</p>
                    <span class="badge badge-red text-uppercase">Pendente Novo Semestre</span>
                </article>
            </section>
        </main>
    </div>

    <!--
    ======================================================================
    [ COMENTÁRIO DIDÁTICO - PROF. RONALDO ]
    
    Por que projetamos blocos isolados lado-a-lado como <aside> e <main> num 
    mesmo nível horizontal?
    R: Porque durante a aula de CSS nós ativaremos o poderoso recurso de "Grid" 
    ou "Flexbox" do CSS3. Sem essas regras, as caixas apenas empilham uma 
    sobre a outra (comportamento de 'block' padrão). Com Flexbox, passamos o controle 
    completo sobre eixos e alinhamento direcional.

    *** Analogia: ***
    Os contêineres e as propriedades do Flexbox operam perfeitamente como os  
    trilhos e guinchos de reposição num bom supermercado organizado. O conteúdo 
    são as mercadorias nas prateleiras: podem fluir lado a lado, ocupar flexivelmente 
    os espaços vazios ou se agruparem em um canto específico quando comandadas.
    
    *** DESAFIOS DE CÓDIGO (Para a Aula de CSS): ***
    1. Usando a classe global `.display-flex`, como transformar o wrapper pai do 
       dashboard num contêiner flexível colocando a sidebar ao lado da content?
    2. Como transformar a imagem de avatar class=`avatar-img` num polígono rendondo 
       perfeito no CSS? (Dica: property border-radius)
    ======================================================================
    -->
</body>
</html>
