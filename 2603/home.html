<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Aluno - Sinfonia</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="row mh-100">
      <aside class="col-2 text-bg-dark p-3" id="menu-lateral">
        <div class="perfil-card text-center">
          <img
            src="../img/avatar.png"
            alt="Foto de perfil do aluno"
            class="avatar-img rounded-circle"
          />
          <p class="nome-aluno">Olá, <strong>Estudante</strong>!</p>
        </div>

        <nav>
          <ul class="nav flex-column">
            <li class="nav-item">
              <a href="home.html" class="nav-link">Painel Inicial</a>
            </li>
            <li class="nav-item">
              <a href="table.html" class="nav-link">Minha Grade</a>
            </li>
            <li class="nav-item">
              <a href="landing.html" class="nav-link">Sair</a>
            </li>
          </ul>
        </nav>
      </aside>

      <main class="col m-2">
        <header class="">
          <h2 class="">Resumo dos seus Cursos</h2>
          <button class="btn" id="btn-msg">
            Mensagens <span class="badge text-bg-secondary">0</span>
          </button>
        </header>

        <section class="row">
          <article class="card col m-2 shadow">
            <div class="card-body">
              <h3 class="card-title">Teoria Musical I</h3>
              <p class="card-text">Prof. Mozart</p>
              <span class="">Concluído</span>
            </div>
          </article>

          <article class="card col m-2 shadow">
            <div class="card-body">
              <h3 class="card-title">Prática de Conjunto</h3>
              <p class="card-text">Prof. Beethoven</p>
              <div class="progress">
                <div class="progress-bar" style="width: 60%"></div>
              </div>
            </div>
          </article>

          <article class="card col m-2 shadow">
            <div class="card-body">
              <h3 class="card-title">Harmonia Funcional</h3>
              <p class="card-text">Prof. Bach</p>
              <a class="btn btn-primary">Pendente Novo Semestre</a>
            </div>
          </article>
        </section>
      </main>

      <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"
      ></script>
    </div>

    <!--
    ======================================================================
    [ COMENTÁRIO DIDÁTICO - PROF. RONALDO ]
    
    Por que projetamos blocos isolados lado-a-lado como <aside> e <main> num 
    mesmo nível horizontal?
    R: Porque durante a aula de CSS nós ativaremos o poderoso recurso de "Grid" 
    ou "Flexbox" do CSS3. Sem essas regras, as caixas apenas empilham uma 
    sobre a outra (comportamento de 'block' padrão). Com Flexbox, passamos o controle 
    completo sobre eixos e alinhamento direcional.

    *** Analogia: ***
    Os contêineres e as propriedades do Flexbox operam perfeitamente como os  
    trilhos e guinchos de reposição num bom supermercado organizado. O conteúdo 
    são as mercadorias nas prateleiras: podem fluir lado a lado, ocupar flexivelmente 
    os espaços vazios ou se agruparem em um canto específico quando comandadas.
    
    *** DESAFIOS DE CÓDIGO (Para a Aula de CSS): ***
    1. Usando a classe global `.display-flex`, como transformar o wrapper pai do 
       dashboard num contêiner flexível colocando a sidebar ao lado da content?
    2. Como transformar a imagem de avatar class=`avatar-img` num polígono rendondo 
       perfeito no CSS? (Dica: property border-radius)
    ======================================================================
    -->
  </body>
</html>
